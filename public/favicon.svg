<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- Fundo arredondado com gradiente -->
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  
  <!-- Mão estilizada: palma + 5 dedos -->
  <g fill="white">
    <!-- Palma -->
    <circle cx="50" cy="52" r="15"/>
    <!-- Polegar -->
    <circle cx="30" cy="44" r="6.5"/>
    <!-- Indicador -->
    <circle cx="40" cy="30" r="6.5"/>
    <!-- Médio -->
    <circle cx="50" cy="24" r="6.5"/>
    <!-- Anelar -->
    <circle cx="60" cy="30" r="6.5"/>
    <!-- Mínimo -->
    <circle cx="70" cy="44" r="6.5"/>
  </g>
  
  <!-- Texto LVP -->
  <text x="50" y="88" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="13" letter-spacing="1">LVP</text>
</svg>